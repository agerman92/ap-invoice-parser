<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Detail</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin: 16px 0 24px 0;
    }

    button {
      padding: 10px 14px;
      cursor: pointer;
    }

    .header-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(250px, 1fr));
      gap: 12px 20px;
      margin-bottom: 24px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-group label {
      font-weight: bold;
    }

    .field-group input,
    .field-group select,
    .field-group textarea {
      padding: 8px;
      font-size: 14px;
    }

    .field-full {
      grid-column: 1 / -1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      vertical-align: top;
    }

    th {
      background: #f3f3f3;
    }

    .line-input {
      width: 100%;
      box-sizing: border-box;
      padding: 6px;
      font-size: 13px;
    }

    .warnings {
      background: #fff7e6;
      border: 1px solid #f0d58c;
      padding: 12px;
      margin-bottom: 20px;
    }

    .status-bar {
      margin: 12px 0;
      font-weight: bold;
    }

    .small-note {
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>Invoice Detail</h1>

  <p><a href="./ap-review.html">← Back to AP Review</a></p>

  <div id="statusMessage" class="status-bar">Loading invoice...</div>

  <div class="actions">
    <button id="saveButton" type="button">Save Changes</button>
    <button id="approveButton" type="button">Approve Invoice</button>
    <button id="duplicateButton" type="button">Mark Duplicate</button>
  </div>

  <h2>Invoice Header</h2>
  <div id="invoiceHeaderForm" class="header-grid"></div>

  <h2>Warnings</h2>
  <div id="invoiceWarnings" class="warnings"></div>

  <h2>Invoice Lines</h2>
  <p class="small-note">You can edit any line and save changes. Current version rewrites all lines for this invoice on save.</p>

  <table>
    <thead>
      <tr>
        <th>Line #</th>
        <th>Type</th>
        <th>Part Number</th>
        <th>Description</th>
        <th>Origin</th>
        <th>Qty</th>
        <th>Unit Price</th>
        <th>Discount %</th>
        <th>Net Unit Price</th>
        <th>Line Total</th>
      </tr>
    </thead>
    <tbody id="lineTableBody"></tbody>
  </table>

  <script type="module" src="../js/ap-invoice.js"></script>
</body>
</html>
